<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7f1;
      color: #213126;
      font-family: Georgia, "Times New Roman", serif;
      padding: 24px;
    }
    main {
      max-width: 560px;
      background: #fff;
      border: 1px solid #d9e3d8;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(33, 49, 38, 0.08);
    }
    h1 { margin: 0 0 12px; }
    p { margin: 0; line-height: 1.6; color: #4d6253; }
    a { color: #1f7a4c; }
  </style>
</head>
<body>
  <main>
    <h1>404: Page not found</h1>
    <p>This Firebase Spark deployment serves static files only. Go back to <a href="/">home</a>.</p>
  </main>
</body>
</html>
